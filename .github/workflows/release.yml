name: Rust Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (例如 v1.0.0)，留空自动生成"
        required: false
      release_name:
        description: "Release 标题"
        required: false
        default: "New Release"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            os_name: linux
            extension: ""
            archive_ext: "tar.gz"
            archive_cmd: tar czf

          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            os_name: windows
            extension: ".exe"
            archive_ext: "zip"
            archive_cmd: 7z a

    env:
      PROJECT_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # ← 更新到 v6 (支持 Node 24)

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os_name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="v$(date +'%Y%m%d')"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}${{ matrix.extension }} release/

      - name: Package
        shell: bash
        working-directory: release
        run: |
          ${{ matrix.archive_cmd }} ${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.os_name }}.${{ matrix.archive_ext }} ${{ env.PROJECT_NAME }}${{ matrix.extension }}

      - name: Upload artifact
        uses: actions/upload-artifact@v8 # v4 仍然可用，最新版也可换成 v8
        with:
          name: ${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.os_name }}
          path: release/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.os_name }}.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8 # 可升级到 v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3 # ← 更新到 v3 (支持 Node 24)
        with:
          tag_name: ${{ github.event.inputs.tag_name || steps.version.outputs.VERSION || format('v{0}', github.sha) }}
          name: ${{ github.event.inputs.release_name || 'Automated Release' }}
          draft: false
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
