name: Rust Release

on:
  workflow_dispatch: # 手动触发
    inputs:
      tag_name:
        description: "Release tag (例如 v1.0.0)，留空则使用当前日期"
        required: false
      release_name:
        description: "Release 标题"
        required: false
        default: "New Release"

permissions:
  contents: write # 必须，用于创建 Release 和上传文件

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux (musl 静态链接，更便携)
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            os_name: linux
            extension: ""
            archive_cmd: |
              tar czf ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-${{ matrix.os_name }}.tar.gz ${{ env.PROJECT_NAME }}

          # Windows (MSVC)
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            os_name: windows
            extension: ".exe"
            archive_cmd: |
              7z a ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-${{ matrix.os_name }}.zip ${{ env.PROJECT_NAME }}${{ matrix.extension }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os_name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          # 项目名称（自动从 Cargo.toml 获取，或手动修改）
          PROJECT_NAME=$(grep '^name' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

          # 版本号
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            VERSION=${{ github.event.inputs.tag_name }}
          else
            VERSION=v$(date +'%Y%m%d')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # 复制二进制文件
          mkdir -p release
          cp target/${{ matrix.target }}/release/${PROJECT_NAME}${matrix.extension} release/${PROJECT_NAME}${matrix.extension}

      - name: Package
        shell: bash
        working-directory: release
        run: |
          ${{ matrix.archive_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ env.VERSION }}-${{ matrix.os_name }}
          path: release/${{ env.PROJECT_NAME }}-${{ env.VERSION }}-${{ matrix.os_name }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || format('v{0}', github.sha) }}
          name: ${{ github.event.inputs.release_name || 'Automated Release' }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
